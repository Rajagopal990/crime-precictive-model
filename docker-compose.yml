version: "3.9"

services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: Dharani@2007
      MYSQL_DATABASE: security
      ALLOW_ORIGINS: http://localhost:3000,http://localhost
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
    depends_on:
      - backend
    ports:
      - "3000:80"
